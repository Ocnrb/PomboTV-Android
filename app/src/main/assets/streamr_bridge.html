<!DOCTYPE html>
<html><head><meta charset="utf-8">
<!-- SDK local (assets/streamr-sdk.min.js, servido por shouldInterceptRequest):
     arranque sem rede/CDN e funciona offline. Atualizar o ficheiro ao subir
     a versão do SDK. -->
<script src="streamr-sdk.min.js"></script>
</head><body>
<script>
'use strict';
// Headless transport bridge: the native app does ALL media work; this page only
// moves opaque binary messages in/out of the Streamr network (base64 over the
// JS bridge). Same streams / config as live-poc.html.
// UM stream, DUAS partições: vídeo em #0, áudio em #1 — uma só sponsorship e
// um só conjunto de operadores cobre tudo (validado E2E 2026-07-16).
// Injetados pelo StreamrBridge.kt (replace de tokens ao carregar a página):
// stream configurável (streams próprios/privados) + identidade persistente.
const STREAM = '__STREAM_ID__';
const BRIDGE_PK = '__BRIDGE_PK__';
// kinds do live (video/audio) + kinds de CHAMADA definidos por bridgeCallStart:
// cv/ca = o que EU publico (call video/audio), rv/ra = o que recebo do par.
const PARTS = { video: 0, audio: 1 };
function sdef(kind) { return { streamId: STREAM, partition: PARTS[kind] }; }

// SDK ≥103.2 (UMD): o global é um namespace; a classe está em .StreamrClient
const SDK = window.StreamrClient;
const StreamrClientClass = (SDK && SDK.StreamrClient) ? SDK.StreamrClient : SDK;

// MODO PROXY (produção): com uma Sponsorship ativa no stream de vídeo, os nós
// dos operadores servem de proxy (WebSocket/TCP — atravessa CGNAT sem TURN).
// Viewer → setProxies(SUBSCRIBE); broadcaster → setProxies(PUBLISH), e o uplink
// cai de ~4× para ~2× o bitrate. Sem proxies descobertos → malha normal.
const USE_PROXY = true;
const proxyNodes = { video: null, audio: null };     // por stream (sponsorships separadas)
const proxySet = { videoSub: false, videoPub: false, audioSub: false, audioPub: false };
// Nº de proxies configurável a partir das definições nativas (0 = forçar malha).
let proxyCountPub = 2, proxyCountSub = 2;
// MODOS de rede (definições nativas):
// meshStart — subscreve JÁ em malha e promove a proxy quando a descoberta acabar
// proxyOnly — malha COMPLETAMENTE proibida: sem join de malha, sem fallbacks;
//             publishes sem proxy ativo são DESCARTADOS (um publish sem proxy
//             entraria na malha automaticamente) e subscribes esperam operadores.
// onePart (single-partition, modo GLOBAL): áudio+vídeo na #0; a #1 é IGNORADA
// por completo — nem viewer, nem monitor, nem join lhe tocam.
let meshStart = false, proxyOnly = false, onePart = false;
function bridgeSetModes(mesh, pOnly, one) {
  proxyOnly = !!pOnly;
  meshStart = !!mesh && !proxyOnly; // proxy-only anula o fast start
  const wasOnePart = onePart;
  onePart = !!one;
  if (proxyOnly) { proxyCountPub = Math.max(1, proxyCountPub); proxyCountSub = Math.max(1, proxyCountSub); }
  console.log('bridge: modes meshStart=' + meshStart + ' proxyOnly=' + proxyOnly + ' onePart=' + onePart);
  // ligou single-partition em plena sessão → largar a subscrição da #1 se existir
  if (onePart && !wasOnePart) {
    for (const s of ['audio', 'monitor']) {}
    if (subs.audio) { const s = subs.audio; delete subs.audio; audioForward = false; if (s) { try { s.unsubscribe(); } catch (e) {} } }
    if (monitorSub) { const s = monitorSub; monitorSub = null; setLive(false); if (s) { try { s.unsubscribe(); } catch (e) {} } }
  }
}
function bridgeSetProxyCounts(pub, sub) {
  proxyCountPub = Math.max(0, Math.min(3, pub | 0));
  proxyCountSub = Math.max(0, Math.min(3, sub | 0));
  if (proxyOnly) { proxyCountPub = Math.max(1, proxyCountPub); proxyCountSub = Math.max(1, proxyCountSub); }
  console.log('bridge: proxy counts pub=' + proxyCountPub + ' sub=' + proxyCountSub);
}

// SAÚDE dos proxies: operadores mortos na sponsorship (unstake/offline) deixam
// o setProxies a queimar ~10s em timeouts. Sonda WebSocket curta a cada
// candidato e usa só os vivos — arranque rápido e sem caminhos mortos.
function wsUrlOf(pd) {
  const w = pd && pd.websocket;
  if (!w || !w.host) return null;
  return (w.tls === false ? 'ws' : 'wss') + '://' + w.host + ':' + w.port;
}
function probeWs(url, ms) {
  return new Promise(function (res) {
    let done = false, ws = null;
    const fin = function (ok) { if (!done) { done = true; try { ws && ws.close(); } catch (e) {} res(ok); } };
    setTimeout(function () { fin(false); }, ms);
    try { ws = new WebSocket(url); } catch (e) { return fin(false); }
    ws.onopen = function () { fin(true); };
    ws.onerror = function () { fin(false); };
  });
}
async function pruneDeadProxies(nodes, label) {
  if (!nodes || nodes.length <= 0) return nodes;
  const alive = await Promise.all(nodes.map(function (n) {
    const u = wsUrlOf(n);
    return u ? probeWs(u, 2500) : Promise.resolve(true); // sem WS anunciado → benefício da dúvida
  }));
  const ok = nodes.filter(function (n, i) { return alive[i]; });
  if (ok.length < nodes.length) console.log('bridge: proxies mortos ignorados (' + label + '): ' + (nodes.length - ok.length) + '/' + nodes.length);
  return ok.length ? ok : nodes; // todos a falhar = sonda inconclusiva → manter
}
async function discoverProxies(kind) { return discoverProxiesDef(sdef(kind), kind); }
// Descoberta POR STREAM-PART. Lição (2026-07-17): os operadores atribuem-se
// por partição (redundância) — um nó descoberto para a #0 ACEITA ligações
// proxy para a #9/#N mas não está nessa malha → eco local, entrega cruzada
// ZERO (meeting: todos no slot #0). Nunca semear partições com nós de outras;
// findProxyNodes(def) devolve os nós certos da partição pedida.
async function discoverProxiesDef(def, label) {
  const maxWant = Math.max(proxyCountPub, proxyCountSub);
  if (maxWant <= 0) return null; // proxies desativados nas definições
  let lastErr = null;
  for (let want = Math.min(maxWant, 3); want >= 1; want--) { // findProxyNodes lança erro se achar menos do que o pedido
    try {
      const nodes = await client.findProxyNodes(def, want);
      return await pruneDeadProxies(nodes, label);
    }
    catch (e) { lastErr = e; }
  }
  console.log('bridge: sem proxies para ' + label + ' (#' + def.partition + ') — malha (' + (lastErr && lastErr.message || '') + ')');
  return null;
}
async function discoverAllProxies() {
  proxyNodes.video = await discoverProxies('video');
  proxyNodes.audio = await discoverProxies('audio');
  // Fallback cruzado: os operadores staked servem TODAS as partições do stream
  // — se a descoberta de uma partição falhar, reutilizar os nós da outra.
  if ((!proxyNodes.video || !proxyNodes.video.length) && proxyNodes.audio && proxyNodes.audio.length)
    proxyNodes.video = proxyNodes.audio;
  if ((!proxyNodes.audio || !proxyNodes.audio.length) && proxyNodes.video && proxyNodes.video.length)
    proxyNodes.audio = proxyNodes.video;
  console.log('bridge: proxies video=' + (proxyNodes.video ? proxyNodes.video.length : 0) +
              ' audio=' + (proxyNodes.audio ? proxyNodes.audio.length : 0));
}

let client = null;
let proxyDiscovery = Promise.resolve();
// setProxies SERIALIZADO: chamadas concorrentes (arranque de chamada = 4+
// partições) contendiam no DHT/ligações e deixavam um caminho morto — visto
// ao vivo: ra a demorar minutos, rv a nunca entregar.
let spChain = Promise.resolve();
function setProxiesSerial(def, nodes, dir, n) {
  const run = function () { return client.setProxies(def, nodes, dir, n); };
  const p = spChain.then(run, run);
  spChain = p.catch(function () {});
  return p;
}
const subs = {};          // forwarding subscriptions (viewer)
const joins = {};         // silent subscriptions (broadcaster overlay participation)
const chains = { video: Promise.resolve(), audio: Promise.resolve() };

function b64ToU8(b64) {
  const bin = atob(b64), u8 = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  return u8;
}
function u8ToB64(u8) {
  let s = ''; const CH = 0x8000;
  for (let i = 0; i < u8.length; i += CH) s += String.fromCharCode.apply(null, u8.subarray(i, i + CH));
  return btoa(s);
}
function asU8(content) {
  if (content instanceof Uint8Array) return content;
  try { return new Uint8Array(content); } catch (e) { return null; }
}

async function boot() {
  try {
    Native.status('connecting to Streamr…');
    // v2: sem ordenação/gap-fill — o jitter buffer nativo ordena por timestamp;
    // a retenção do orderer só convertia atraso em rajada (quebra → burst).
    client = new StreamrClientClass({
      orderMessages: false, gapFill: false,
      auth: { privateKey: BRIDGE_PK }, // identidade persistente (das prefs nativas)
      // LAN: sem isto, candidatos WebRTC de endereços privados são filtrados e
      // um broadcaster na mesma rede local pode ficar inalcançável (o áudio
      // pode ainda passar por um caminho alternativo, o vídeo grande não).
      network: { controlLayer: { webrtcAllowPrivateAddresses: true } },
      contracts: { rpcs: [
        { url: 'https://polygon-bor-rpc.publicnode.com' },
        { url: 'https://polygon.drpc.org' },
        { url: 'https://polygon.gateway.tenderly.co' },
      ] }
    });
    await client.connect();
    // Descoberta de proxies em PARALELO: 'connected' é reportado já (a app fica
    // pronta segundos mais cedo); subscribe/join esperam pela descoberta (com
    // teto). O settle de 1s evita chamar a DHT no instante do connect — visto
    // rebentar com "Maximum call stack size exceeded" e envenenar stream-parts.
    proxyDiscovery = (async function () {
      await new Promise(function (r) { setTimeout(r, 1000); });
      if (USE_PROXY) await discoverAllProxies();
    })().catch(function () {});
    const addr = await client.getAddress();
    Native.connected(addr);
  } catch (e) {
    Native.error('ligação falhou: ' + (e && e.message || e));
  }
}

// Per-kind promise chain keeps publish order (same trick as vChain/aChain in the POC).
// Every publish is ACKED back to native (success or failure corrige o inFlight),
// mas jsAcked só conta SUCESSOS — é o sinal do watchdog de tx do broadcaster.
let jsPub = 0, jsAcked = 0;
// Progresso POR KIND: acks saudáveis de vídeo não podem esconder um caminho de
// áudio morto (visto ao vivo com proxies de áudio caídos).
const jsAckAt = { video: 0, audio: 0 }, jsTryAt = { video: 0, audio: 0 };
let poDropWarnAt = 0;
let msBlockedAt = 0; // anti-repique do aviso de slot bloqueado (cannot broadcast)
const txCount = {}; // diagnóstico: nº de publishes por kind (linha rx de 5s)
const txFail = {};  // e falhas por kind (client.publish rejeitado)
function bridgePublish(kind, b64) {
  txCount[kind] = (txCount[kind] || 0) + 1;
  const bytes = b64ToU8(b64);
  if (!client) { try { Native.acked(kind, bytes.length); } catch (e) {} return; }
  // PROXY-ONLY: publicar sem proxy ativo entraria na MALHA — descartar até o
  // watchdog de TX conseguir promover (ack para o inFlight não crescer).
  if (proxyOnly && !proxySet[kind + 'Pub']) {
    jsTryAt[kind] = Date.now(); // arma o watchdog de TX (redescoberta/promoção)
    try { Native.acked(kind, bytes.length); } catch (e) {}
    const now = Date.now();
    if (now - poDropWarnAt > 5000) {
      poDropWarnAt = now;
      console.log('bridge: proxy-only sem proxies de ' + kind + ' → publish descartado');
      try { Native.status('proxy-only: waiting for operators…'); } catch (e) {}
    }
    return;
  }
  jsPub++;
  if (!jsTryAt[kind]) jsAckAt[kind] = Date.now(); // 1º publish semeia o relógio de acks
  jsTryAt[kind] = Date.now();
  chains[kind] = chains[kind]
    .then(() => client.publish(sdef(kind), bytes, { contentType: 'binary' }))
    .then(
      () => { jsAcked++; jsAckAt[kind] = Date.now(); try { Native.acked(kind, bytes.length); } catch (e) {} },
      (e) => {
        txFail[kind] = (txFail[kind] || 0) + 1;
        if (txFail[kind] === 1 || txFail[kind] % 100 === 0)
          console.log('bridge: publish ' + kind + ' FALHOU ×' + txFail[kind] + ': ' + (e && e.message || e));
        // slot próprio (ms) bloqueado por publisher FANTASMA (proxy-only): o
        // nativo re-escolhe o slot. Anti-repique: só 1 aviso por bloqueio.
        if (kind === 'ms' && /cannot broadcast|already being published/i.test(e && e.message || '')) {
          const now = Date.now();
          if (now - (msBlockedAt || 0) > 5000) { msBlockedAt = now; try { Native.meetSlotBlocked(); } catch (x) {} }
        }
        try { Native.acked(kind, bytes.length); } catch (x) {}
      }
    );
}

// contadores de diagnóstico: aparecem no logcat via StreamrBridgeJS a cada 5s
const rx = { video: 0, audio: 0, videoBytes: 0, audioBytes: 0 };
setInterval(() => {
  console.log('bridge rx: video=' + rx.video + ' (' + Math.round(rx.videoBytes / 1024) + 'KB) audio=' + rx.audio + ' (' + Math.round(rx.audioBytes / 1024) + 'KB)' +
    ' rv=' + (rx.rv || 0) + ' ra=' + (rx.ra || 0) +
    ' tx=[' + Object.keys(txCount).map(k => k + ':' + txCount[k]).join(',') + ']' +
    ' txFail=[' + Object.keys(txFail).map(k => k + ':' + txFail[k]).join(',') + ']' +
    ' subs=[' + Object.keys(subs).join(',') + '] joins=[' + Object.keys(joins).join(',') + ']');
}, 5000);

// NETINFO → consola nativa: por stream, nº de proxies em uso e vizinhos de
// malha do overlay (0 esperado em modo proxy — o nó sai da malha).
async function meshNeighborsSp(sp) {
  try {
    const node = await client.getNode();
    if (node.getNeighbors) {
      const ns = await node.getNeighbors(sp);
      if (ns && typeof ns.length === 'number') return ns.length;
    }
    if (node.getDiagnosticInfo) {
      const di = await node.getDiagnosticInfo();
      const sd = di && di.streams && di.streams[sp];
      if (sd && sd.neighbors && typeof sd.neighbors.length === 'number') return sd.neighbors.length;
    }
  } catch (e) {}
  return -1;
}
function meshNeighbors(kind) { const d = sdef(kind); return meshNeighborsSp(d.streamId + '#' + d.partition); }
setInterval(async () => {
  if (!client) return;
  const active = k => !!(subs[k] || joins[k] || proxySet[k + 'Sub'] || proxySet[k + 'Pub']);
  const info = {};
  // Live/Watch/Call: video/audio
  for (const kind of ['video', 'audio']) {
    if (!active(kind)) continue;
    const have = (proxyNodes[kind] || []).length;
    const pxSub = proxySet[kind + 'Sub'] ? Math.min(proxyCountSub, have) : 0;
    const pxPub = proxySet[kind + 'Pub'] ? Math.min(proxyCountPub, have) : 0;
    info[kind] = { proxy: Math.max(pxSub, pxPub), mesh: await meshNeighbors(kind) };
  }
  // MEETING: o meu slot (ms, publish) + o controlo (#9) — contador consistente
  if (PARTS.ms !== undefined) {
    const haveMs = (proxyNodes.ms || []).length;
    info['slot#' + PARTS.ms] = { proxy: proxySet['msPub'] ? Math.min(proxyCountPub, haveMs) : 0, mesh: await meshNeighbors('ms') };
    const haveC = (proxyNodes.ctrl || []).length;
    const cSub = proxySet['ctrlSub'] ? Math.min(proxyCountSub, haveC) : 0;
    const cPub = proxySet['ctrlPub'] ? Math.min(proxyCountPub, haveC) : 0;
    info['ctrl#9'] = { proxy: Math.max(cSub, cPub), mesh: await meshNeighborsSp(mdefCtrl().streamId + '#' + mdefCtrl().partition) };
  }
  if (Object.keys(info).length) try { Native.netinfo(JSON.stringify(info)); } catch (e) {}
}, 5000);

// Watchdog de entrega: uma ligação proxy (ou de malha) pode morrer em silêncio
// e o SDK não a recupera. Se estamos subscritos e NADA chega há 12s →
// redescobrir proxies e re-subscrever (auto-recuperação).
let wdRecovering = false, wdFails = 0;
function withTimeout(p, ms) {
  return Promise.race([p, new Promise((_, rej) => setTimeout(() => rej(new Error('timeout ' + ms + 'ms')), ms))]);
}

// client.subscribe pode PENDURAR para sempre (visto: video#0 nunca resolveu
// após um stack overflow do SDK no arranque) — timeout + retry.
async function subscribeWithRetry(def, handler, label) {
  let lastErr = null;
  for (let i = 1; i <= 3; i++) {
    const p = client.subscribe(def, handler);
    try { return await withTimeout(p, 15000); }
    catch (e) {
      lastErr = e;
      // O subscribe que fez timeout pode resolver DEPOIS — ficava um sub
      // ZOMBIE a entregar tudo em duplicado (áudio 2× = "câmara lenta").
      p.then(function (s) { try { s.unsubscribe(); } catch (x) {} }).catch(function () {});
      console.log('bridge: subscribe ' + label + ' tentativa ' + i + ' falhou: ' + (e && e.message || e));
    }
  }
  throw lastErr || new Error('subscribe ' + label + ' falhou');
}
// POR KIND: áudio a fluir não pode esconder vídeo morto (visto ao vivo —
// proxy-SUBSCRIBE de vídeo "ativo" com 0 bytes enquanto o áudio corria).
// Armado quando: esse kind JÁ recebeu e parou 12s, OU nunca recebeu mas o
// OUTRO kind flui (prova de que a emissão está viva). Na recuperação a lista
// de operadores é RODADA — experimentar outros quando uns estão mortos.
const WD_KINDS = ['video', 'audio', 'rv', 'ra']; // inclui a receção da CHAMADA
const wdAt = { video: Date.now(), audio: Date.now(), rv: Date.now(), ra: Date.now() };
const wdCount = { video: 0, audio: 0, rv: 0, ra: 0 };
setInterval(async () => {
  const now = Date.now();
  for (const k of WD_KINDS) {
    if ((rx[k] || 0) !== wdCount[k]) { wdCount[k] = rx[k] || 0; wdAt[k] = now; }
    if (!subs[k]) wdAt[k] = now; // não subscrito → não armado
  }
  if (subsInFlight > 0 || wdRecovering) return;
  const anyFlow = WD_KINDS.some(k => now - wdAt[k] < 6000);
  const stalled = WD_KINDS.filter(k =>
    subs[k] && now - wdAt[k] > 12000 && (wdCount[k] > 0 || anyFlow));
  if (!stalled.length) { wdFails = 0; return; }
  wdRecovering = true;
  console.log('bridge: entrega parada em [' + stalled.join(',') + '] → recuperação');
  try {
    // TIMEOUT em toda a recuperação: um await pendurado (cliente morto) deixava
    // wdRecovering preso em true e o watchdog mudo para sempre.
    await withTimeout((async () => {
      for (const kind of stalled) {
        const s = subs[kind]; delete subs[kind];
        if (s) { try { await s.unsubscribe(); } catch (e) {} }
      }
      if (USE_PROXY) await discoverAllProxies();
      // kinds de chamada: redescobrir POR PARTIÇÃO (não herdar os nós do live)
      for (const k of ['rv', 'ra']) if (stalled.includes(k)) {
        try { proxyNodes[k] = await discoverProxiesDef(sdef(k), k); } catch (e) { proxyNodes[k] = null; }
        if (!(proxyNodes[k] || []).length && proxyOnly)
          proxyNodes[k] = proxyNodes.video || proxyNodes.audio || null;
      }
      const PD = (SDK && SDK.ProxyDirection) ? SDK.ProxyDirection : { PUBLISH: 0, SUBSCRIBE: 1 };
      for (const kind of stalled) {
        const nodes = proxyNodes[kind];
        if (nodes && nodes.length > 1) nodes.push(nodes.shift()); // rodar operadores
        if (proxySet[kind + 'Sub'] && (!nodes || !nodes.length)) {
          if (proxyOnly) {
            // sem malha: re-subscreve por cima do proxy morto (o nó continua em
            // modo proxy — zero malha) e volta a tentar na próxima ronda
            await bridgeSubscribe(kind);
            wdAt[kind] = Date.now();
            continue;
          }
          // Operadores desapareceram → limpar config (lista vazia) = voltar à MALHA
          try { await setProxiesSerial(sdef(kind), [], PD.SUBSCRIBE); } catch (e) {}
          console.log('bridge: proxies de ' + kind + ' desapareceram → malha');
        }
        proxySet[kind + 'Sub'] = false;
        await bridgeSubscribe(kind);
        wdAt[kind] = Date.now(); // dar tempo ao caminho novo
      }
    })(), 20000);
    console.log('bridge: recuperação concluída');
    wdFails = 0;
  } catch (e) {
    wdFails++;
    console.log('bridge: recuperação falhou (' + (e && e.message || e) + ') ×' + wdFails);
  } finally {
    wdRecovering = false;
  }
  if (wdFails >= 2) {
    if (proxyOnly) { wdFails = 0; return; } // sem operadores não há nada a renascer — re-tenta
    // O mundo JS está podre (cliente irrecuperável) → pedir ao nativo um
    // renascimento completo da página (bridge.reconnect + resubscrição).
    wdFails = 0;
    console.log('bridge: 2 recuperações falhadas → reload completo');
    try { Native.needReload(); } catch (e) {}
  }
}, 3000);

// Watchdog de TX (broadcaster): proxies de publish podem morrer (operadores em
// unstake/offline) — publish fica sem acks e o stream morre em silêncio.
// 15s sem acks com publishes pendentes → redescobrir; sem operadores → limpar
// proxy e voltar a publicar em MALHA (re-entrando nos próprios overlays).
let wdbRecovering = false, wdbFails = 0;
setInterval(async () => {
  if (wdbRecovering) return;
  const now = Date.now();
  // por kind (inclui publicação da CHAMADA cv/ca): publiquei há <30s mas não
  // há ack desse kind há 15s → caminho morto
  const stalled = ['video', 'audio', 'cv', 'ca'].filter(k =>
    jsTryAt[k] > 0 && now - jsTryAt[k] < 30000 && now - jsAckAt[k] > 15000);
  if (!stalled.length) { wdbFails = 0; return; }
  wdbRecovering = true;
  console.log('bridge: sem acks de [' + stalled.join(',') + '] há 15s → redescoberta (broadcaster)');
  try {
    await withTimeout((async () => {
      if (USE_PROXY) await discoverAllProxies();
      const PD = (SDK && SDK.ProxyDirection) ? SDK.ProxyDirection : { PUBLISH: 0, SUBSCRIBE: 1 };
      for (const kind of stalled) {
        // proxy-only: mesmo sem proxy aplicado ainda (gate a descartar publishes),
        // este watchdog é o caminho de promoção quando os operadores voltam
        if (!proxySet[kind + 'Pub'] && !proxyOnly) continue;
        const nodes = proxyNodes[kind];
        if (proxyCountPub > 0 && nodes && nodes.length) {
          const use = nodes.slice(0, proxyCountPub);
          await setProxiesSerial(sdef(kind), use, PD.PUBLISH, use.length);
          proxySet[kind + 'Pub'] = true;
          console.log('bridge: proxy-PUBLISH ' + kind + ' renovado (' + use.length + ')');
        } else if (!proxyOnly && kind !== 'cv' && kind !== 'ca') {
          // (kinds de chamada nunca fazem mesh-join da própria partição —
          // mantêm proxies e re-tentam na ronda seguinte)
          try { await setProxiesSerial(sdef(kind), [], PD.PUBLISH); } catch (e) {}
          proxySet[kind + 'Pub'] = false;
          delete joins[kind];
          await bridgeJoin(kind); // volta a participar na malha desse stream
          console.log('bridge: proxies de ' + kind + ' desapareceram → publish em malha');
        }
        // (proxy-only sem nós vivos: mantém-se o gate a descartar — sem malha)
        jsAckAt[kind] = Date.now(); // dar tempo ao caminho novo antes de re-disparar
      }
    })(), 20000);
    wdbFails = 0;
  } catch (e) {
    wdbFails++;
    console.log('bridge: recuperação broadcaster falhou (' + (e && e.message || e) + ') ×' + wdbFails);
  } finally {
    wdbRecovering = false;
  }
  if (wdbFails >= 2) { wdbFails = 0; if (!proxyOnly) { try { Native.needReload(); } catch (e) {} } }
}, 5000);

// PROMOTOR: garante que HAVENDO proxies, são eles a ser usados e não a malha
// de client nodes. Sessões em fallback de malha (arranque sem operadores, ou
// operadores que morreram) são promovidas de volta a proxy quando reaparecem.
setInterval(async () => {
  if (!client || wdRecovering || wdbRecovering) return;
  const PD = (SDK && SDK.ProxyDirection) ? SDK.ProxyDirection : { PUBLISH: 0, SUBSCRIBE: 1 };
  try {
    for (const kind of ['video', 'audio']) {
      // viewer em malha → promover a proxy-SUBSCRIBE
      if (proxyCountSub > 0 && subs[kind] && !proxySet[kind + 'Sub']) {
        const nodes = await discoverProxies(kind);
        if (nodes && nodes.length) {
          proxyNodes[kind] = nodes;
          const use = nodes.slice(0, proxyCountSub);
          await setProxiesSerial(sdef(kind), use, PD.SUBSCRIBE, use.length);
          proxySet[kind + 'Sub'] = true;
          console.log('bridge: promovido a proxy-SUBSCRIBE ' + kind);
        }
      }
      // broadcaster em malha → promover a proxy-PUBLISH (e sair da malha)
      if (proxyCountPub > 0 && joins[kind] && !proxySet[kind + 'Pub']) {
        const nodes = await discoverProxies(kind);
        if (nodes && nodes.length) {
          proxyNodes[kind] = nodes;
          const s = joins[kind]; delete joins[kind];
          if (s) { try { await s.unsubscribe(); } catch (e) {} }
          const use = nodes.slice(0, proxyCountPub);
          await setProxiesSerial(sdef(kind), use, PD.PUBLISH, use.length);
          proxySet[kind + 'Pub'] = true;
          console.log('bridge: promovido a proxy-PUBLISH ' + kind);
        }
      }
    }
  } catch (e) { console.log('bridge: promotor falhou: ' + (e && e.message || e)); }
}, 120000);

// MONITOR de live: subscrição persistente ao ÁUDIO (barato, ~10KB/s vs 2Mbps
// do vídeo) enquanto não há sessão ativa — mensagens recentes = broadcast no
// ar (mic mutado continua a emitir silêncio opus, o sinal é fiável). Dá
// resposta INSTANTÂNEA ao Go Live (uma sonda pontual falhava: o join do
// overlay num subscribe frio demora mais que a janela da sonda).
let monitorSub = null, lastLiveMs = 0, liveNow = false, monMsgs = 0;
let monitorBusy = Promise.resolve(); // teardown do monitor em curso
// HANDOVER monitor↔sessão: o Watch herda a subscrição de áudio viva do monitor
// (mesma partição, mesmo proxy) em vez de a destruir e recriar — poupa ~7s de
// unsubscribe+resubscribe no arranque. audioForward liga o encaminhamento para
// o nativo; o sinal de live (lastLiveMs) é atualizado SEMPRE, para o sub poder
// voltar a ser o monitor quando a sessão acaba.
let audioForward = false;
function deliverNative(kind, content) {
  const u8 = asU8(content);
  if (u8) {
    rx[kind]++; rx[kind + 'Bytes'] += u8.length;
    try { Native.message(kind, u8ToB64(u8)); } catch (e) {}
  }
}
function onAudioContent(content) {
  monMsgs++; lastLiveMs = Date.now();
  if (audioForward) deliverNative('audio', content);
}
function setLive(v) {
  if (v !== liveNow) {
    liveNow = v;
    console.log('monitor: live=' + v + ' (msgs=' + monMsgs + ')');
    try { Native.liveState(v); } catch (e) {}
  }
}
async function bridgeMonitorStart() {
  if (!client || monitorSub) return;
  // single-partition: a #1 é ignorada → o monitor (que subscreve a #1) não corre;
  // o badge "LIVE now" fica inativo neste modo (trade-off por eficiência).
  if (onePart) { setLive(false); return; }
  // settle: arrancar em cima do teardown de uma sessão (unsubscribe ainda em
  // curso) deixava esta subscrição morta — esperar que o pó assente.
  try { await monitorBusy; } catch (e) {}
  await new Promise(function (r) { setTimeout(r, 1500); });
  if (!client || monitorSub) return;
  // NUNCA com uma sessão ativa — o monitor por cima da subscrição da sessão
  // (corrida no arranque/paragem) foi fonte de instabilidade
  if (subs.video || subs.audio || joins.video || joins.audio) return;
  // PROXY também no monitor: o join de MALHA (WebRTC do WebView → operadores)
  // é intermitente no telemóvel; o caminho proxy (WS) é o fiável — sem isto o
  // badge de live falhava aleatoriamente.
  try { await withTimeout(proxyDiscovery, 10000); } catch (e) {}
  try {
    const nodes = proxyNodes.audio;
    if (proxyCountSub > 0 && nodes && nodes.length && !proxySet['audioSub']) {
      const dir = (SDK && SDK.ProxyDirection) ? SDK.ProxyDirection.SUBSCRIBE : 1;
      const use = nodes.slice(0, proxyCountSub);
      await withTimeout(setProxiesSerial(sdef('audio'), use, dir, use.length), 15000);
      proxySet['audioSub'] = true;
      console.log('monitor: proxy-SUBSCRIBE audio (' + use.length + ')');
    }
  } catch (e) { console.log('monitor: setProxies falhou (' + (e && e.message || e) + ') → malha'); }
  // proxy-only: sem proxy de áudio o monitor NÃO subscreve (seria malha) —
  // badge fica inativo e re-tenta em 30s
  if (proxyOnly && !proxySet['audioSub']) {
    console.log('monitor: proxy-only sem operadores → retry 30s');
    setTimeout(function () { bridgeMonitorStart(); }, 30000);
    return;
  }
  try {
    monitorSub = await subscribeWithRetry(sdef('audio'), onAudioContent, 'monitor');
    // corrida: uma sessão arrancou enquanto este subscribe estava em voo —
    // não pode haver duas subscrições no mesmo stream-part (entregas 2×)
    if (subs.audio || joins.audio) {
      const s = monitorSub; monitorSub = null;
      if (s) { try { await s.unsubscribe(); } catch (e) {} }
      return;
    }
    console.log('monitor: subscribed (audio)');
  } catch (e) {
    monitorSub = null;
    console.log('monitor: subscribe falhou: ' + (e && e.message || e));
  }
}
async function bridgeMonitorStop() {
  const s = monitorSub; monitorSub = null;
  setLive(false);
  // O unsubscribe fica registado em monitorBusy: subscrever o MESMO stream-part
  // com este teardown em voo matava a subscrição da sessão (áudio nunca
  // arrancava) — bridgeSubscribe/bridgeJoin esperam por ele.
  monitorBusy = (async function () { if (s) { try { await s.unsubscribe(); } catch (e) {} } })();
  await monitorBusy;
}
setInterval(() => { if (monitorSub) setLive(Date.now() - lastLiveMs < 4000); }, 1000);

let subsInFlight = 0; // o watchdog não pode re-subscrever com isto >0 (subs duplicados)
// desejo do nativo por kind (subscribe pedido e ainda não cancelado) — usado
// pelos retries do modo proxy-only
const wanted = { video: false, audio: false };
async function poRetrySubscribe(kind) {
  if (!wanted[kind] || subs[kind] || !client) return;
  proxyDiscovery = (async function () { if (USE_PROXY) await discoverAllProxies(); })().catch(function () {});
  try { await withTimeout(proxyDiscovery, 15000); } catch (e) {}
  if (!wanted[kind] || subs[kind]) return;
  bridgeSubscribe(kind);
}
async function bridgeSubscribe(kind) {
  if (!client || subs[kind]) return;
  // single-partition: a #1 (áudio) é IGNORADA — o áudio vem demultiplexado da
  // #0 (FLAG_AUD). Não subscrever; se estava subscrita, largar.
  if (onePart && kind === 'audio') {
    console.log('bridge: single-partition → #1 ignorada (subscribe audio no-op)');
    return;
  }
  wanted[kind] = true;
  // HANDOVER: o monitor já tem a subscrição de áudio viva (mesma partição,
  // mesmo proxy) — a sessão herda-a e liga o encaminhamento. Arranque ~0s.
  if (kind === 'audio' && monitorSub) {
    subs.audio = monitorSub; monitorSub = null;
    audioForward = true;
    console.log('bridge: audio handover monitor→sessão');
    return;
  }
  console.log('bridge: subscribe ' + kind + ' start');
  subsInFlight++;
  try {
  // Só o ÁUDIO partilha o stream-part com o monitor — o vídeo não precisa de
  // esperar por um teardown do monitor em curso (era ~7s mortos no arranque).
  if (kind === 'audio') { try { await withTimeout(monitorBusy, 8000); } catch (e) {} }
  // fast start: não esperar pela descoberta — subscreve em malha e promove
  if (!meshStart) { try { await withTimeout(proxyDiscovery, 10000); } catch (e) {} }
  if (subs[kind]) return; // corrida: outra chamada completou durante a espera
  try {
    // Viewer em modo proxy: o stream chega por WebSocket via operadores (sem
    // WebRTC/TURN) — por stream, conforme a sponsorship respetiva.
    let nodes = proxyNodes[kind];
    // kinds de chamada/meeting (rv/ra/p0-p8): descoberta POR PARTIÇÃO na 1ª vez
    // (nós do live só em proxy-only — noutras partições fazem eco sem entregar)
    if ((!nodes || !nodes.length) && kind !== 'video' && kind !== 'audio' &&
        !meshStart && proxyCountSub > 0 && !proxySet[kind + 'Sub']) {
      try { nodes = proxyNodes[kind] = await withTimeout(discoverProxiesDef(sdef(kind), kind), 8000); } catch (e) {}
      if ((!nodes || !nodes.length) && proxyOnly)
        nodes = proxyNodes[kind] = proxyNodes.video || proxyNodes.audio || null;
    }
    if (!meshStart && proxyCountSub > 0 && nodes && nodes.length && !proxySet[kind + 'Sub']) {
      try {
        const dir = (SDK && SDK.ProxyDirection) ? SDK.ProxyDirection.SUBSCRIBE : 1;
        const use = nodes.slice(0, proxyCountSub);
        await withTimeout(setProxiesSerial(sdef(kind), use, dir, use.length), 15000); // pode pendurar (WebView + DHT pesada)
        proxySet[kind + 'Sub'] = true;
        console.log('bridge: proxy-SUBSCRIBE ' + kind + ' ativo (' + use.length + ')');
      } catch (e) { console.log('bridge: setProxies ' + kind + ' falhou (' + (e && e.message || e) + ')'); }
    }
    // PROXY-ONLY: sem proxy ativo não há subscribe (seria malha) — re-tenta
    if (proxyOnly && !proxySet[kind + 'Sub']) {
      console.log('bridge: proxy-only sem proxies de ' + kind + ' → retry 5s');
      try { Native.status('proxy-only: waiting for operators…'); } catch (e) {}
      setTimeout(function () { poRetrySubscribe(kind); }, 5000);
      return;
    }
    if (kind === 'audio') {
      audioForward = true;
      subs.audio = await subscribeWithRetry(sdef('audio'), onAudioContent, 'audio');
    } else {
      subs[kind] = await subscribeWithRetry(sdef(kind), (content) => deliverNative(kind, content), kind);
    }
    console.log('bridge: subscribed ' + kind);
    // fast start: promoção a proxy em background (o promotor periódico é backup)
    if (meshStart && proxyCountSub > 0 && !proxySet[kind + 'Sub']) {
      (async function () {
        try {
          await withTimeout(proxyDiscovery, 15000);
          const n2 = proxyNodes[kind];
          if (n2 && n2.length && !proxySet[kind + 'Sub'] && subs[kind]) {
            const dir = (SDK && SDK.ProxyDirection) ? SDK.ProxyDirection.SUBSCRIBE : 1;
            const use = n2.slice(0, proxyCountSub);
            await withTimeout(setProxiesSerial(sdef(kind), use, dir, use.length), 15000);
            proxySet[kind + 'Sub'] = true;
            console.log('bridge: fast start → promovido a proxy-SUBSCRIBE ' + kind);
          }
        } catch (e) { console.log('bridge: fast start promoção adiada (' + (e && e.message || e) + ')'); }
      })();
    }
  } catch (e) { Native.error('subscribe ' + kind + ': ' + (e && e.message || e)); }
  } finally { subsInFlight--; }
}
async function bridgeUnsubscribe(kind) {
  wanted[kind] = false; // trava os retries do modo proxy-only
  const s = subs[kind]; delete subs[kind];
  if (kind === 'audio') {
    audioForward = false;
    // HANDBACK: em vez de destruir a subscrição, devolvê-la ao monitor — o
    // badge de live volta a funcionar já e o próximo Watch herda-a de novo.
    if (s && !monitorSub) { monitorSub = s; return; }
  }
  if (s) { try { await s.unsubscribe(); } catch (e) {} }
}

// Broadcaster: em modo proxy o vídeo publica-se VIA operadores (uplink ~2×
// bitrate em vez de 4×) e NÃO se entra na malha desse stream. Sem proxies,
// mantém-se o comportamento clássico: entrar nos próprios overlays como
// participante (pure publishers get poor delivery). Nunca se encaminham
// mensagens para o nativo a partir daqui.
async function bridgeJoin(kind) {
  if (!client || joins[kind]) return;
  // single-partition: não se entra no overlay da #1 (áudio publica-se na #0)
  if (onePart && kind === 'audio') return;
  try { await monitorBusy; } catch (e) {}
  try { await withTimeout(proxyDiscovery, 10000); } catch (e) {}
  if (joins[kind]) return;
  const nodes = proxyNodes[kind];
  if (proxyCountPub > 0 && nodes && nodes.length) {
    if (!proxySet[kind + 'Pub']) {
      try {
        const dir = (SDK && SDK.ProxyDirection) ? SDK.ProxyDirection.PUBLISH : 0;
        const use = nodes.slice(0, proxyCountPub);
        await withTimeout(setProxiesSerial(sdef(kind), use, dir, use.length), 15000); // pode pendurar (WebView + DHT pesada)
        proxySet[kind + 'Pub'] = true;
        console.log('bridge: proxy-PUBLISH ' + kind + ' ativo (' + use.length + ')');
      } catch (e) { console.log('bridge: proxy-PUBLISH ' + kind + ' falhou: ' + (e && e.message || e)); }
    }
    return; // em proxy mode não se junta à malha desse stream
  }
  // PROXY-ONLY: sem operadores NÃO há join de malha — o gate do bridgePublish
  // descarta os payloads e o watchdog de TX fica a redescobrir/promover.
  if (proxyOnly) {
    console.log('bridge: proxy-only sem proxies de ' + kind + ' — publish em espera de operadores');
    try { Native.status('proxy-only: waiting for operators…'); } catch (e) {}
    return;
  }
  try { joins[kind] = await subscribeWithRetry(sdef(kind), () => {}, 'join-' + kind); }
  catch (e) {}
}
async function bridgeLeave(kind) {
  const s = joins[kind]; delete joins[kind];
  if (s) { try { await s.unsubscribe(); } catch (e) {} }
}

// ================= CALL 1:1 (multi-partição, mesmo stream) =================
// Host publica em #2(vid)/#3(aud) e subscreve #4/#5; Guest o inverso. Depois
// do bridgeCallStart, os kinds cv/ca/rv/ra funcionam nos caminhos GENÉRICOS
// (bridgePublish/bridgeSubscribe) — herdam modos, gates de proxy-only e retries.
const CALL_PARTS = { host: { pubV: 2, pubA: 3, subV: 4, subA: 5 }, guest: { pubV: 4, pubA: 5, subV: 2, subA: 3 } };
async function bridgeCallStart(role) {
  const P = CALL_PARTS[role] || CALL_PARTS.host;
  PARTS.cv = P.pubV; PARTS.ca = P.pubA; PARTS.rv = P.subV; PARTS.ra = P.subA;
  for (const k of ['cv', 'ca', 'rv', 'ra']) {
    rx[k] = 0; rx[k + 'Bytes'] = 0;
    jsAckAt[k] = 0; jsTryAt[k] = 0;
    chains[k] = Promise.resolve();
    wanted[k] = false;
    delete proxySet[k + 'Pub']; delete proxySet[k + 'Sub'];
  }
  console.log('bridge: call start role=' + role + ' pub=#' + PARTS.cv + '/#' + PARTS.ca + ' sub=#' + PARTS.rv + '/#' + PARTS.ra);
  if (!meshStart) { try { await withTimeout(proxyDiscovery, 10000); } catch (e) {} }
  // descoberta POR PARTIÇÃO dos kinds de publish da chamada (rv/ra ficam para
  // o bridgeSubscribe lazy); nós do live só como fallback em proxy-only
  for (const k of ['cv', 'ca']) {
    if (!(proxyNodes[k] || []).length) {
      try { proxyNodes[k] = await withTimeout(discoverProxiesDef(sdef(k), k), 8000); } catch (e) {}
      if (!(proxyNodes[k] || []).length && proxyOnly)
        proxyNodes[k] = proxyNodes.video || proxyNodes.audio || null;
    }
  }
  // proxies de PUBLISH das partições próprias (subscribe é o bridgeSubscribe genérico)
  const PD = (SDK && SDK.ProxyDirection) ? SDK.ProxyDirection : { PUBLISH: 0, SUBSCRIBE: 1 };
  for (const k of ['cv', 'ca']) {
    const nodes = proxyNodes[k];
    if (proxyCountPub > 0 && nodes && nodes.length) {
      try {
        const use = nodes.slice(0, proxyCountPub);
        await withTimeout(setProxiesSerial(sdef(k), use, PD.PUBLISH, use.length), 15000);
        proxySet[k + 'Pub'] = true;
        console.log('bridge: call proxy-PUBLISH ' + k + ' ativo (#' + PARTS[k] + ')');
      } catch (e) { console.log('bridge: call proxy-PUBLISH ' + k + ' falhou: ' + (e && e.message || e)); }
    }
  }
  if (proxyOnly && (!proxySet['cvPub'] || !proxySet['caPub']))
    try { Native.status('proxy-only: waiting for operators…'); } catch (e) {}
}
async function bridgeCallStop() {
  for (const k of ['rv', 'ra']) { try { await bridgeUnsubscribe(k); } catch (e) {} }
  const PD = (SDK && SDK.ProxyDirection) ? SDK.ProxyDirection : { PUBLISH: 0, SUBSCRIBE: 1 };
  // limpar o modo proxy das partições da chamada (sem subs não há malha)
  for (const k of ['cv', 'ca']) if (proxySet[k + 'Pub']) { try { await setProxiesSerial(sdef(k), [], PD.PUBLISH); } catch (e) {} proxySet[k + 'Pub'] = false; }
  for (const k of ['rv', 'ra']) if (proxySet[k + 'Sub']) { try { await setProxiesSerial(sdef(k), [], PD.SUBSCRIBE); } catch (e) {} proxySet[k + 'Sub'] = false; }
  console.log('bridge: call stop');
}

// ================= MEETING (single-partition por slot) =================
// Cada participante publica A/V (FLAG_AUD) na SUA partição (#0-#8) e subscreve
// as dos outros; a #9 é o canal de CONTROLO/presença em JSON (interop com o
// v3: {t:'who'|'hb'|'join'|'leave', id, slot}). Kinds: ms = o meu slot
// (publish), p0..p8 = slots remotos (bridgeSubscribe genérico — herdam modos,
// gates de proxy-only e retries). O controlo tem caminho próprio porque é
// JSON, não o wire binário.
const MEET_CTRL_PART = 9;
let meetCtrlSub = null;
function mdefCtrl() { return { streamId: STREAM, partition: MEET_CTRL_PART }; }
async function bridgeMeetCtrlStart() {
  if (!client || meetCtrlSub) return;
  // CONTROLO #9 VIA PROXIES (como o vídeo — atravessa NAT/CGNAT). A #9 é
  // many-to-many (todos pub+sub a mesma partição) e o modo proxy SUPORTA isso
  // (diagnóstico 2026-07-18: C1 1→N entrega; C2 pub+sub proxy co-existem).
  // DUAS regras aprendidas à força:
  //  1) descoberta POR PARTIÇÃO (#9) — nós da #0 aceitam a ligação mas NÃO
  //     estão na malha da #9 → eco-only.
  //  2) SUBSCREVER TRADICIONALMENTE PRIMEIRO, aplicar proxies DEPOIS (a ordem
  //     inversa quebra a entrega — misturar proxy + subscribe tradicional).
  try {
    meetCtrlSub = await subscribeWithRetry(mdefCtrl(), function (content) {
      try { Native.meetCtrl(JSON.stringify(content)); } catch (e) {}
    }, 'meet-ctrl');
    console.log('bridge: meet ctrl subscribed (#9)');
  } catch (e) { Native.error('meet ctrl subscribe: ' + (e && e.message || e)); return; }
  // proxies DEPOIS da subscrição (fast start = malha; proxy-only força proxy)
  if (meshStart) return;
  const PD = (SDK && SDK.ProxyDirection) ? SDK.ProxyDirection : { PUBLISH: 0, SUBSCRIBE: 1 };
  let nodes = null;
  try { nodes = await withTimeout(discoverProxiesDef(mdefCtrl(), 'ctrl'), 8000); } catch (e) {}
  if ((!nodes || !nodes.length) && proxyOnly) nodes = proxyNodes.video || proxyNodes.audio;
  if (nodes && nodes.length) {
    proxyNodes.ctrl = nodes; // registo p/ o netinfo (contador de proxies da #9)
    try {
      if (proxyCountSub > 0) { const us = nodes.slice(0, proxyCountSub); await withTimeout(setProxiesSerial(mdefCtrl(), us, PD.SUBSCRIBE, us.length), 15000); proxySet['ctrlSub'] = true; }
      if (proxyCountPub > 0) { const up = nodes.slice(0, proxyCountPub); await withTimeout(setProxiesSerial(mdefCtrl(), up, PD.PUBLISH, up.length), 15000); proxySet['ctrlPub'] = true; }
      console.log('bridge: meet ctrl proxies ativos (#9)');
    } catch (e) { console.log('bridge: meet ctrl proxies falharam → malha: ' + (e && e.message || e)); }
  }
}
function bridgeMeetCtrlPub(b64) {
  if (!client) return;
  try {
    const obj = JSON.parse(atob(b64)); // JSON simples (ASCII) — interop v3
    client.publish(mdefCtrl(), obj).catch(function (e) {
      console.log('bridge: meet ctrl pub falhou: ' + (e && e.message || e));
    });
  } catch (e) {}
}
async function bridgeMeetStart(slot) {
  const PD = (SDK && SDK.ProxyDirection) ? SDK.ProxyDirection : { PUBLISH: 0, SUBSCRIBE: 1 };
  // mudança de slot (colisão): limpar o caminho do slot ANTIGO antes de remapear
  if (PARTS.ms !== undefined && PARTS.ms !== slot) {
    if (proxySet['msPub']) { try { await setProxiesSerial(sdef('ms'), [], PD.PUBLISH); } catch (e) {} delete proxySet['msPub']; }
    const j = joins.ms; delete joins.ms;
    if (j) { try { await j.unsubscribe(); } catch (e) {} }
  }
  PARTS.ms = slot;
  for (let s = 0; s <= 8; s++) {
    PARTS['p' + s] = s;
    rx['p' + s] = rx['p' + s] || 0; rx['p' + s + 'Bytes'] = rx['p' + s + 'Bytes'] || 0;
    // sem seed: o bridgeSubscribe descobre por partição quando o slot for preciso
  }
  rx.ms = 0; rx.msBytes = 0; jsAckAt.ms = 0; jsTryAt.ms = 0;
  chains.ms = Promise.resolve();
  // descoberta POR PARTIÇÃO do slot próprio (nós do live só em proxy-only)
  proxyNodes.ms = null;
  try { proxyNodes.ms = await withTimeout(discoverProxiesDef(sdef('ms'), 'ms'), 8000); } catch (e) {}
  if ((!proxyNodes.ms || !proxyNodes.ms.length) && proxyOnly)
    proxyNodes.ms = proxyNodes.video || proxyNodes.audio || null;
  console.log('bridge: meet start slot=#' + slot);
  const nodes = proxyNodes.ms;
  if (proxyCountPub > 0 && nodes && nodes.length) {
    try {
      const use = nodes.slice(0, proxyCountPub);
      await withTimeout(setProxiesSerial(sdef('ms'), use, PD.PUBLISH, use.length), 15000);
      proxySet['msPub'] = true;
      console.log('bridge: meet proxy-PUBLISH ms ativo (#' + slot + ')');
    } catch (e) { console.log('bridge: meet proxy-PUBLISH falhou: ' + (e && e.message || e)); }
  }
  if (!proxySet['msPub'] && !proxyOnly) {
    // malha: participar no próprio overlay (publisher puro entrega mal)
    try { joins.ms = await subscribeWithRetry(sdef('ms'), function () {}, 'join-ms'); } catch (e) {}
  }
}
async function bridgeMeetStop() {
  const s = meetCtrlSub; meetCtrlSub = null;
  if (s) { try { await s.unsubscribe(); } catch (e) {} }
  const j = joins.ms; delete joins.ms;
  if (j) { try { await j.unsubscribe(); } catch (e) {} }
  for (let i = 0; i <= 8; i++) { try { await bridgeUnsubscribe('p' + i); } catch (e) {} }
  const PD = (SDK && SDK.ProxyDirection) ? SDK.ProxyDirection : { PUBLISH: 0, SUBSCRIBE: 1 };
  if (proxySet['msPub']) { try { await setProxiesSerial(sdef('ms'), [], PD.PUBLISH); } catch (e) {} delete proxySet['msPub']; }
  for (let i = 0; i <= 8; i++) if (proxySet['p' + i + 'Sub']) {
    try { await setProxiesSerial(sdef('p' + i), [], PD.SUBSCRIBE); } catch (e) {}
    delete proxySet['p' + i + 'Sub'];
  }
  try { await setProxiesSerial(mdefCtrl(), [], PD.SUBSCRIBE); } catch (e) {}
  try { await setProxiesSerial(mdefCtrl(), [], PD.PUBLISH); } catch (e) {}
  delete proxySet['ctrlSub']; delete proxySet['ctrlPub'];
  proxyNodes.ctrl = null; proxyNodes.ms = null;
  delete PARTS.ms;
  console.log('bridge: meet stop');
}

boot();
</script>
